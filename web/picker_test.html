<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentry Provider Picker v2.8.2</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --border: #1e293b;
            --accent: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text: #f8fafc;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            padding-top: 80px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            margin: 0;
        }

        .picker-card {
            width: 400px;
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .status-log {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        select {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            color: #fff;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            margin-bottom: 16px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #cta-button {
            width: 100%;
            padding: 16px;
            background: var(--warning);
            color: #000;
            font-weight: 900;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            display: none;
            transition: opacity 0.2s;
        }

        #cta-button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="picker-card">
        <div id="status-display" class="status-log">[OK] MESH: CONNECTING...</div>

        <label>1. Source Provider</label>
        <select id="prov-list"><option value="">-- SEARCHING NODE 1 --</option></select>

        <label>2. Capability Filter</label>
        <select id="type-filter" disabled>
            <option value="all">-- ALL MODELS --</option>
            <option value="chat">TEXT GENERATION</option>
            <option value="vision">MULTIMODAL / VISION</option>
            <option value="audio">SENSORY / AUDIO</option>
            <option value="coding">CODING / PYTHON</option>
            <option value="embedding">EMBEDDING / RERANK</option>
            <option value="agentic">🤖 AGENTIC / TOOL-USE</option>
        </select>

        <label>3. Target Model</label>
        <select id="model-list" disabled><option value="">-- AWAITING PROVIDER --</option></select>

        <button id="cta-button">Engage Target</button>
    </div>

    <script>
        const API_BASE = 'http://100.101.24.26:8080';
        const ui = {
            status: document.getElementById('status-display'),
            provider: document.getElementById('prov-list'),
            filter: document.getElementById('type-filter'),
            model: document.getElementById('model-list'),
            cta: document.getElementById('cta-button')
        };

        let activeModels = [];

        // Wrapper to prevent the UI from hanging if the Pi drops offline
        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 5000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(resource, {
                ...options,
                signal: controller.signal
            });
            clearTimeout(id);
            return response;
        }

        async function bootstrap() {
            try {
                updateUI('Pinging Sentry Hub...', '#f59e0b');

                const res = await fetchWithTimeout(`${API_BASE}/api/v1/providers`, { cache: "no-store", timeout: 5000 });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const providers = await res.json();
                updateUI('Mesh Online [v2.8.2]', '#10b981');

                ui.provider.innerHTML = '<option value="">-- SELECT PROVIDER --</option>' +
                    providers.map(p => `<option value="${p}">${p.toUpperCase()}</option>`).join('');

                ui.provider.onchange = (e) => fetchManifest(e.target.value);
                ui.filter.onchange = () => renderModels();
                ui.model.onchange = (e) => {
                    ui.cta.style.display = e.target.value ? 'block' : 'none';
                    ui.cta.innerText = `Engage -> ${ui.provider.value.toUpperCase()}`;
                };
            } catch (err) {
                // If it hits the 5-second timeout, it lands here instantly instead of hanging
                updateUI(`Mesh Offline: ${err.name === 'AbortError' ? 'Timeout' : 'Refused'}`, '#ef4444');
                ui.provider.innerHTML = '<option>SENTRY UNREACHABLE</option>';
            }
        }

        async function fetchManifest(provider) {
            if (!provider) {
                ui.model.innerHTML = '<option value="">-- AWAITING PROVIDER --</option>';
                ui.model.disabled = true;
                ui.filter.disabled = true;
                ui.cta.style.display = 'none';
                return;
            }

            updateUI(`Vaulting: ${provider}`, '#f59e0b');
            ui.model.innerHTML = '<option>RETRIEVING KEY...</option>';
            ui.cta.style.display = 'none';

            try {
                // Generous 15s timeout for discovery fetching
                const res = await fetchWithTimeout(`${API_BASE}/api/v1/manifest/${provider}`, { cache: "no-store", timeout: 15000 });
                const data = await res.json();
                activeModels = data.models || [];

                updateUI(`${activeModels.length} Models Discovered`, '#10b981');
                ui.filter.disabled = false;
                ui.model.disabled = false;
                renderModels();
            } catch (e) {
                updateUI('Discovery Error', '#ef4444');
            }
        }

        function renderModels() {
            const filterType = ui.filter.value;
            const filtered = activeModels.filter(m => filterType === 'all' || m.type === filterType);

            ui.model.innerHTML = `<option value="">-- ${filtered.length} TARGETS --</option>` +
                filtered.map(m => {
                    const val = m.model_id || m.id || m.name;
                    const text = m.name || m.displayName || val;
                    return `<option value="${val}">${text}</option>`;
                }).join('');

            ui.cta.style.display = 'none';
        }

        function updateUI(msg, color) {
            ui.status.innerText = `[OK] ${msg}`;
            ui.status.style.color = color;
        }

        window.onload = bootstrap;
    </script>
</body>
</html>
