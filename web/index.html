<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHIDORAH // NODE X // ARENA MATCHMAKER</title>
    <style>
        :root {
            --accent-green: #00ff41;
            --accent-cyan: #00f3ff;
            --glass-bg: rgba(10, 10, 15, 0.92);
            --border-color: rgba(255, 255, 255, 0.2);
            --text-color: #EAEAEA;
            --disabled-opacity: 0.15;
        }

        body {
            background-color: #050505;
            color: var(--text-color);
            font-family: 'Menlo', 'Consolas', monospace;
            margin: 0;
            overflow: hidden;
        }

        /* 1. POSTMAN SIDEBAR */
        #postman-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            transform: translateX(-400px);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 20px;
            z-index: 100;
        }

        .picker-step {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            opacity: var(--disabled-opacity);
            pointer-events: none;
            transition: opacity 0.3s ease-in-out, box-shadow 200ms ease-in;
        }

        .picker-step.active {
            opacity: 1;
            pointer-events: auto;
        }

        .picker-step.confirmed {
            border-left: 3px solid var(--accent-green);
        }

        .selection-glow {
            box-shadow: 0 0 15px 5px rgba(0, 255, 65, 0.4);
        }

        /* 2. ARENA GRID */
        #arena-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 20px;
            margin-left: 40px; /* To avoid being under the closed sidebar */
        }

        .fighter-slot {
            height: 200px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0.4;
            transition: opacity 0.3s, border-color 0.3s;
        }

        .fighter-slot.active {
            opacity: 1;
            border-top: 4px solid var(--accent-cyan);
            border-style: solid;
            background: rgba(0, 243, 255, 0.05);
        }

        .fighter-slot-text {
            color: var(--text-color);
            font-size: 14px;
        }

        /* 3. GENERAL UI */
        h2 {
            font-family: 'Bebas Neue', sans-serif; /* Assuming you might add this font */
            color: var(--accent-cyan);
            letter-spacing: 1px;
        }

        select, button {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }

        button {
            background-color: var(--accent-cyan);
            color: #000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 1. THE POSTMAN SIDEBAR -->
    <aside id="postman-sidebar">
        <h2>DISCOVERY ENGINE</h2>

        <!-- STEP 01: PROVIDER -->
        <div id="step-01" class="picker-step active">
            <h3>01: Provider</h3>
            <select id="provider-select" onchange="ui.handleSelect('provider', this.value)">
                <option value="">-- Select Provider --</option>
            </select>
        </div>

        <!-- STEP 02: TYPE (MODALITY) -->
        <div id="step-02" class="picker-step">
            <h3>02: Type (Modality)</h3>
            <select id="type-select" onchange="ui.handleSelect('type', this.value)">
                <option value="">-- Select Type --</option>
            </select>
        </div>

        <!-- STEP 03: TIER (PERFORMANCE/COST) -->
        <div id="step-03" class="picker-step">
            <h3>03: Tier</h3>
            <select id="tier-select" onchange="ui.handleSelect('tier', this.value)">
                <option value="">-- Select Tier --</option>
            </select>
        </div>

        <!-- STEP 04: MODEL -->
        <div id="step-04" class="picker-step">
            <h3>04: Model</h3>
            <select id="model-select" onchange="ui.handleSelect('model', this.value)">
                <option value="">-- Select Model --</option>
            </select>
        </div>
    </aside>

    <!-- 2. THE ARENA GRID -->
    <main id="arena-grid">
        <div id="slot-0" class="fighter-slot">
            <span class="fighter-slot-text">AWAITING_SUMMON</span>
        </div>
        <div id="slot-1" class="fighter-slot">
            <span class="fighter-slot-text">AWAITING_SUMMON</span>
        </div>
        <div id="slot-2" class="fighter-slot">
            <span class="fighter-slot-text">AWAITING_SUMMON</span>
        </div>
        <div id="slot-3" class="fighter-slot">
            <span class="fighter-slot-text">AWAITING_SUMMON</span>
        </div>
        <div id="slot-4" class="fighter-slot">
            <span class="fighter-slot-text">AWAITING_SUMMON</span>
        </div>
    </main>

    <!-- A button to toggle the sidebar for testing -->
    <button onclick="ui.toggleSidebar()" style="position: fixed; top: 20px; right: 20px; width: auto; z-index: 200;">Toggle Menu</button>

    <!-- 3. SCRIPT INTEGRATION -->
    <script type="module">
        // Use relative paths from web/ to core/
        import { Matchmaker } from '../core/Matchmaker.js';
        import { ArenaUI } from '../core/ArenaUI.js';

        // The manifest path is also relative to the HTML file's location
        const matchmaker = new Matchmaker('../core/manifest.json');

        // Make the UI instance globally accessible for inline event handlers
        window.ui = new ArenaUI(matchmaker);

        // Initialize the application
        window.ui.initialize();
    </script>

</body>
</html>
