<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Team Command Center - Node X</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dela+Gothic+One&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* These update dynamically via theme_manager.js */
            --cardinal-base: #4CAF50;
            --current-glow: #56d364;
            --alert-red: #ff0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* SVG Filters Definitions - Used for the Halftone effect */
        .svg-filters {
            display: none;
        }

        /* Dynamic Pop Art Background Collage */
        .kaiju-collage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            /* Base image from assets */
            background-image: url('../assets/wp4377514.jpg');
            background-size: cover;
            background-position: center;
            /* SVG Halftone Filter application */
            filter: url(#halftone) grayscale(100%) contrast(200%) brightness(80%);
            mix-blend-mode: screen;
            opacity: 0.3; /* IDLE State Default */
            /* Radial mask to feather the edges like a comic vignette */
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            transition: opacity 1s ease-in-out, filter 0.5s ease-in-out;
        }

        /* Halftone overlay (CSS approach fallback) */
        .halftone-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle, #ffffff 1px, transparent 2px);
            background-size: 6px 6px;
            opacity: 0.05;
            mix-blend-mode: overlay;
        }

        /* Dynamic Background Tint mapped to model color */
        .bg-tint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -2;
            background-color: var(--current-glow);
            opacity: 0.15;
            transition: background-color 1s ease;
        }

        /* The Obi Strip */
        .obi-strip {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background-color: var(--cardinal-base);
            box-shadow: 0 0 20px var(--current-glow);
            z-index: 100;
            transition: background-color 0.5s, box-shadow 0.5s;
            /* Apply halftone pattern to the strip */
            background-image: radial-gradient(circle, rgba(0,0,0,0.5) 1px, transparent 1px);
            background-size: 4px 4px;
        }

        /* Kaiju Watermark */
        .kaiju-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40vw;
            color: var(--current-glow);
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
            user-select: none;
            transition: color 0.5s;
            font-family: 'Dela Gothic One', cursive;
        }

        .pulse-animation {
            animation: kaiju-pulse 1s ease-out;
        }
        @keyframes kaiju-pulse {
            0% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.15; transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 10px 30px;
            background-color: rgba(13, 17, 23, 0.85);
            border-bottom: 1px solid #30363d;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .header h1 {
            margin: 0;
            font-family: 'Bebas Neue', Impact, sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: var(--current-glow);
            text-transform: uppercase;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.8);
        }

        /* Fading Stock Ticker */
        .ticker-wrapper {
            position: relative;
            width: 300px;
            height: 20px;
            text-align: right;
            font-family: "Space Mono", "Courier New", Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            color: var(--current-glow);
            text-shadow: 0 0 5px var(--current-glow);
        }
        .ticker-item {
            position: absolute;
            right: 0;
            top: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            white-space: nowrap;
        }
        .ticker-item.active {
            opacity: 1;
        }

        /* Layout */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        /* Sidebar (Sticky Command Deck) */
        .sidebar {
            width: 380px;
            background-color: rgba(13, 17, 23, 0.85);
            border-right: 1px solid var(--current-glow);
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 20px rgba(0,0,0,0.6);
            z-index: 10;
            backdrop-filter: blur(10px);
            transition: border-color 0.5s;
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: transparent;
            position: relative;
        }

        /* Main Tabs (Arena / Forge) */
        .main-tabs {
            display: flex;
            background-color: rgba(13, 17, 23, 0.9);
            border-bottom: 1px solid #30363d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .main-tab-btn {
            background: none;
            border: none;
            color: #8b949e;
            padding: 15px 25px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Bebas Neue', Impact, sans-serif;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
        }
        .main-tab-btn:hover { color: #c9d1d9; }
        .main-tab-btn.active {
            color: var(--current-glow);
            border-bottom-color: var(--current-glow);
            text-shadow: 0 0 10px rgba(var(--current-glow), 0.5);
        }

        /* Chat History (Accordion Cards) */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .chat-turn {
            margin-bottom: 20px;
            background-color: rgba(22, 27, 34, 0.85);
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            /* Sci-fi glitch transition on load */
            animation: glitch-in 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        @keyframes glitch-in {
            0% { clip-path: polygon(0 0, 100% 0, 100% 10%, 0 10%); opacity: 0; transform: translateY(10px); }
            50% { clip-path: polygon(0 20%, 100% 20%, 100% 100%, 0 100%); opacity: 1; transform: translateY(-5px); }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transform: translateY(0); }
        }

        .chat-message {
            padding: 15px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            font-size: 15px;
        }
        .chat-message.user-role {
            background-color: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #30363d;
            color: #c9d1d9;
            font-weight: 500;
        }
        .chat-message.assistant-role {
            color: #e2e8f0;
            background-color: rgba(13, 17, 23, 0.4);
        }

        /* Postman / Telemetry Accordion */
        .telemetry-expander {
            background-color: #0d1117;
            border-top: 1px solid #30363d;
            font-family: "Space Mono", "Courier New", Courier, monospace;
            font-size: 12px;
        }
        .telemetry-header {
            padding: 10px 20px;
            color: var(--current-glow);
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
            font-weight: bold;
            background-color: rgba(22, 27, 34, 0.9);
            transition: background-color 0.2s;
        }
        .telemetry-header:hover { background-color: #30363d; }
        .telemetry-chevron {
            transition: transform 0.2s ease;
            margin-right: 10px;
            font-size: 10px;
            display: inline-block;
        }
        .telemetry-header.open .telemetry-chevron { transform: rotate(90deg); }
        .telemetry-body {
            display: none;
            padding: 15px 20px;
            border-top: 1px solid #30363d;
            white-space: pre-wrap;
            color: #8b949e;
            max-height: 300px;
            overflow-y: auto;
            background-color: #000;
        }
        .telemetry-header.open + .telemetry-body { display: block; }

        /* Sticky Command Deck (Bottom Input) */
        .command-deck {
            padding: 20px;
            background-color: rgba(13, 17, 23, 0.95);
            border-top: 1px solid var(--current-glow);
            display: flex;
            gap: 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: border-color 0.5s;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background-color: #000;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            font-family: "Space Mono", monospace;
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--current-glow);
            box-shadow: 0 0 0 2px rgba(var(--current-glow), 0.2);
        }

        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background-color: #21262d;
            color: #c9d1d9;
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border: 1px solid #30363d;
            text-transform: uppercase;
        }
        button:hover {
            background-color: #30363d;
            color: white;
        }
        button.primary {
            background-color: var(--cardinal-base);
            color: #000;
            border-color: var(--current-glow);
            text-shadow: none;
        }
        button.primary:hover {
            background-color: var(--current-glow);
            box-shadow: 0 0 15px rgba(var(--current-glow), 0.4);
        }
        button.alert {
            background-color: transparent;
            color: var(--alert-red);
            border-color: var(--alert-red);
        }
        button.alert:hover {
            background-color: rgba(255,0,0,0.15);
            box-shadow: inset 0 0 10px rgba(255,0,0,0.3);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* MiM Editor */
        .mim-editor {
            display: none;
            flex-direction: column;
            border: 2px solid var(--alert-red);
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
            background-color: rgba(13, 17, 23, 0.98);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            position: absolute;
            bottom: 100px; /* Float above command deck */
            left: 20px;
            right: 20px;
            z-index: 50;
            backdrop-filter: blur(10px);
        }
        .mim-editor.active {
            display: flex;
            animation: mim-pulse 2s infinite;
        }
        @keyframes mim-pulse {
            0% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
            50% { box-shadow: 0 0 35px rgba(255, 0, 0, 0.7); }
            100% { box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
        }

        /* Sidebar Forms & Tabs */
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #c9d1d9;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
        }

        /* Forge Tabs */
        .forge-tabs {
            display: flex;
            border-bottom: 1px solid #30363d;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .forge-tab-btn {
            background: none;
            border: none;
            color: #8b949e;
            padding: 10px 12px;
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
        }
        .forge-tab-btn.active {
            color: var(--current-glow);
            border-bottom-color: var(--current-glow);
        }
        .forge-tab-content { display: none; font-family: "Space Mono", monospace; font-size: 12px;}
        .forge-tab-content.active { display: block; }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background-color: #0d1117;
            margin: 15% auto;
            padding: 30px;
            border: 1px solid var(--current-glow);
            border-radius: 8px;
            width: 450px;
            color: #e2e8f0;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(22, 27, 34, 0.5);
            border-top: 3px solid var(--current-glow);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Checkbox styling */
        input[type="checkbox"] {
            accent-color: var(--current-glow);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444c56; }
    </style>
</head>
<body>

    <!-- SVG Filters for the Halftone / Pop Art Effect -->
    <svg class="svg-filters">
        <defs>
            <filter id="halftone">
                <!-- Convert to grayscale -->
                <feColorMatrix type="matrix" values="0.33 0.33 0.33 0 0
                                                     0.33 0.33 0.33 0 0
                                                     0.33 0.33 0.33 0 0
                                                     0 0 0 1 0" result="gray"/>
                <!-- Posterize/threshold to get sharp black & white -->
                <feComponentTransfer in="gray" result="threshold">
                    <feFuncR type="step" tableValues="0 1"/>
                    <feFuncG type="step" tableValues="0 1"/>
                    <feFuncB type="step" tableValues="0 1"/>
                </feComponentTransfer>
                <!-- Colorize: Maps white to the current glow color (via CSS) -->
            </filter>
        </defs>
    </svg>

    <div class="bg-tint"></div>
    <div class="halftone-overlay"></div>
    <div class="kaiju-collage" id="dynamic-bg"></div>
    <div class="obi-strip"></div>
    <div class="kaiju-watermark" id="kaiju-watermark">龍</div>

    <div class="header">
        <h1>Node X <span style="color:#8b949e; font-size: 16px;">// Interrogator</span></h1>
        <div class="ticker-wrapper">
            <span class="ticker-item active" id="ticker-cost">💵 $0.000000 BURN</span>
            <span class="ticker-item" id="ticker-co2">☢️ 0.0000g CO2</span>
        </div>
    </div>

    <!-- Modals -->
    <div id="sessionModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: var(--current-glow); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-size: 32px;">SAVE SESSION?</h2>
            <p style="font-size: 15px; color: #8b949e; font-family: 'Space Mono', monospace;">You are switching targets. Save the current interrogation history to the vault before clearing the deck?</p>
            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px;">
                <button type="button" id="modal-discard-btn">Discard</button>
                <button type="button" class="primary" id="modal-save-btn">Save to Vault</button>
            </div>
        </div>
    </div>

    <div class="main-content">

        <!-- SIDEBAR: TAPE DECK & FORGE -->
        <div class="sidebar">
            <div class="sidebar-scroll">

                <div class="form-group">
                    <label for="model-select">Target Model</label>
                    <select id="model-select">
                        <option value="">Hydrating models...</option>
                    </select>
                    <div id="model-error" style="color: var(--alert-red); display: none; font-size: 12px; margin-top: 8px; font-family: 'Space Mono', monospace;">[WARN] Target lacks vision capability.</div>
                </div>

                <div class="form-group">
                    <label>Tape Deck</label>
                    <div style="display: flex; gap: 8px;">
                        <button type="button" class="primary" id="play-btn" style="flex: 1;">▶ Play Sequence</button>
                        <button type="button" id="record-btn" class="alert">🔴 REC</button>
                    </div>
                </div>

                <div class="form-group" style="background-color: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; border-left: 3px solid var(--alert-red);">
                    <label style="color: var(--alert-red); display: flex; align-items: center; gap: 8px; margin: 0; cursor: pointer;">
                        <input type="checkbox" id="mim-toggle">
                        ENABLE MiM INTERCEPT (BURP MODE)
                    </label>
                </div>

                <hr style="border-color: #30363d; margin: 30px 0;">

                <label style="font-size: 20px; color: white;">Payload Factory</label>

                <div class="forge-tabs">
                    <button type="button" class="forge-tab-btn active" onclick="openForgeTab(event, 'f-mutate')">MUTATE</button>
                    <button type="button" class="forge-tab-btn" onclick="openForgeTab(event, 'f-trans')">TRANSLATE</button>
                    <button type="button" class="forge-tab-btn" onclick="openForgeTab(event, 'f-tricky')">CATALOG</button>
                </div>

                <div id="f-mutate" class="forge-tab-content active">
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="mut-zalgo" style="margin:0; font-family: 'Space Mono', monospace; cursor: pointer;"><input type="checkbox" id="mut-zalgo"> Zalgo</label>
                        <input type="range" id="sev-zalgo" min="0" max="1" step="0.1" value="0.5" style="width: 120px;">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="mut-scrambler" style="margin:0; font-family: 'Space Mono', monospace; cursor: pointer;"><input type="checkbox" id="mut-scrambler"> Scramble</label>
                        <input type="range" id="sev-scrambler" min="0" max="1" step="0.1" value="0.5" style="width: 120px;">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="mut-emoji" style="margin:0; font-family: 'Space Mono', monospace; cursor: pointer;"><input type="checkbox" id="mut-emoji"> Emojis</label>
                        <input type="range" id="sev-emoji" min="0" max="1" step="0.1" value="0.5" style="width: 120px;">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="mut-science" style="margin:0; font-family: 'Space Mono', monospace; cursor: pointer;"><input type="checkbox" id="mut-science"> Greek</label>
                        <input type="range" id="sev-science" min="0" max="1" step="0.1" value="0.5" style="width: 120px;">
                    </div>
                    <div class="form-group">
                        <label for="mut-rtl" style="margin:0; font-family: 'Space Mono', monospace; cursor: pointer;"><input type="checkbox" id="mut-rtl"> RTL Override</label>
                    </div>
                </div>

                <div id="f-trans" class="forge-tab-content">
                    <div class="form-group">
                        <label for="mut-trans" style="font-family: 'Space Mono', monospace; cursor: pointer;"><input type="checkbox" id="mut-trans"> Wrap Redirect</label>
                    </div>
                    <div class="form-group">
                        <select id="trans-lang-select"></select>
                    </div>
                </div>

                <div id="f-tricky" class="forge-tab-content">
                    <div id="catalog-tricky-container"></div>
                </div>

            </div>
        </div>

        <!-- MAIN ARENA -->
        <div class="chat-area">

            <div class="main-tabs">
                <button type="button" class="main-tab-btn active">Terminal</button>
            </div>

            <div class="mim-editor" id="mim-editor">
                <h3 style="margin: 0 0 10px 0; color: var(--alert-red); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 24px;">🛑 INTERCEPT PAUSED</h3>
                <textarea id="mim-textarea" aria-label="Manual Payload Override" style="font-size: 16px;"></textarea>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                    <button type="button" id="mim-drop-btn" style="background-color: transparent; border: 1px solid #8b949e; color: #8b949e;">Drop</button>
                    <button type="button" id="mim-release-btn" style="background-color: var(--alert-red); color: white; border: none;">Release ➡</button>
                </div>
            </div>

            <div class="chat-history" id="chat-history">
                <!-- Chat turns appended here -->
            </div>

            <div class="loader" id="chat-loader"></div>

            <div class="command-deck">
                <input type="file" id="image-upload" accept="image/png, image/jpeg" style="width: 40px; padding: 0; border: none; background: transparent; cursor: pointer;" title="Attach Image">
                <div id="image-preview-container" style="display: none; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 4px; overflow: hidden; border: 1px solid var(--current-glow); margin-left: 10px;">
                    <img id="image-preview" style="width: 100%; height: 100%; object-fit: cover;" alt="preview"/>
                </div>
                <input type="text" id="prompt-input" placeholder="Inject payload..." autocomplete="off" aria-label="Prompt Input">
                <button type="button" class="primary" id="send-btn">DISPATCH</button>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="js/theme_manager.js"></script>
    <script src="js/network_client.js"></script>
    <script src="js/harvester.js"></script>
    <script src="js/sequencer_sm.js"></script>

    <script>
        // INIT MODULES
        const themeManager = new ThemeManager();
        const netClient = new NetworkClient("http://127.0.0.1:8000");
        const sequencer = new SequenceController();

        // --- UI LOGIC ---
        function openForgeTab(evt, tabId) {
            Array.from(document.getElementsByClassName("forge-tab-content")).forEach(el => el.style.display = "none");
            Array.from(document.getElementsByClassName("forge-tab-btn")).forEach(el => el.classList.remove("active"));
            document.getElementById(tabId).style.display = "block";
            evt.currentTarget.classList.add("active");
        }

        window.toggleExpander = function(headerElement) {
            headerElement.classList.toggle('open');
        };

        // --- TICKER ---
        let totalCost = 0.0, totalCO2 = 0.0, showingCost = true;
        let isRecording = false;

        setInterval(() => {
            const costEl = document.getElementById('ticker-cost');
            const co2El = document.getElementById('ticker-co2');
            if (showingCost) { costEl.classList.remove('active'); co2El.classList.add('active'); }
            else { co2El.classList.remove('active'); costEl.classList.add('active'); }
            showingCost = !showingCost;
        }, 4000);

        function updateTicker(cost, co2) {
            totalCost += parseFloat(cost || 0);
            totalCO2 += parseFloat(co2 || 0);
            document.getElementById('ticker-cost').innerText = `💵 $${totalCost.toFixed(6)} BURN`;
            document.getElementById('ticker-co2').innerText = `☢️ ${totalCO2.toFixed(4)}g CO2`;
        }

        // --- CHAT RENDERING ---
        const chatHistory = document.getElementById('chat-history');
        function appendChatTurn(userText, assistantText, metadata) {
            const turnDiv = document.createElement('div');
            turnDiv.className = 'chat-turn';

            const userMsg = document.createElement('div');
            userMsg.className = 'chat-message user-role';
            userMsg.innerText = userText;
            turnDiv.appendChild(userMsg);

            const botMsg = document.createElement('div');
            botMsg.className = 'chat-message assistant-role';
            botMsg.innerText = assistantText;
            turnDiv.appendChild(botMsg);

            if (metadata) {
                const expanderDiv = document.createElement('div');
                expanderDiv.className = 'telemetry-expander';
                const metaString = JSON.stringify(metadata, null, 2);
                const tokenCount = metadata.usage?.total_tokens || metadata.usage?.total || '?';
                const latency = metadata.latency_ms !== undefined ? `${metadata.latency_ms}ms` : '---';

                expanderDiv.innerHTML = `
                    <div class="telemetry-header" onclick="toggleExpander(this)">
                        <span class="telemetry-chevron">▶</span> [POSTMAN] ${latency} | Tokens: ${tokenCount}
                    </div>
                    <div class="telemetry-body">${metaString}</div>
                `;
                turnDiv.appendChild(expanderDiv);
            }

            chatHistory.appendChild(turnDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function appendLogEvent(eventText) {
            const msgDiv = document.createElement('div');
            msgDiv.style.color = '#8b949e';
            msgDiv.style.fontSize = '12px';
            msgDiv.style.fontFamily = 'monospace';
            msgDiv.style.textAlign = 'center';
            msgDiv.style.margin = '10px 0';
            msgDiv.innerText = `[SYSTEM] 📡 ${eventText}`;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // --- DISPATCH LOGIC ---
        let uploadedImageBase64 = null;
        document.getElementById('image-upload').addEventListener('change', e => {
            const file = e.target.files[0];
            const previewContainer = document.getElementById('image-preview-container');
            const previewImg = document.getElementById('image-preview');

            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    uploadedImageBase64 = reader.result;
                    previewImg.src = uploadedImageBase64;
                    previewContainer.style.display = 'flex';
                };
                reader.readAsDataURL(file);
            } else {
                uploadedImageBase64 = null;
                previewContainer.style.display = 'none';
            }
        });

        window.dispatchToLiveModel = async function(payloadText) {
            const modelId = document.getElementById('model-select').value;
            let formattedPayload = payloadText;

            if (uploadedImageBase64) {
                formattedPayload = [
                    { "type": "text", "text": payloadText },
                    { "type": "image_url", "image_url": { "url": uploadedImageBase64 } }
                ];
            }

            try {
                const res = await netClient.call('/api/v1/dispatch', {
                    model: modelId,
                    payload: formattedPayload
                });

                const data = await res.json();
                appendChatTurn(payloadText, data.response, data);
                themeManager.triggerHandshakePulse();

                // Reset Image State
                uploadedImageBase64 = null;
                document.getElementById('image-preview-container').style.display = 'none';
                document.getElementById('image-upload').value = '';

                // Telemetry Burn
                if (data.usage) {
                    const burnRes = await netClient.call('/api/v1/telemetry/burn', {
                        model: modelId,
                        prompt_tokens: data.usage.prompt_tokens || 0,
                        completion_tokens: data.usage.completion_tokens || 0
                    });
                    const burn = await burnRes.json();
                    updateTicker(burn.cost_usd, burn.co2_grams);
                }
                return true;
            } catch (e) {
                appendChatTurn(payloadText, `[ERROR] Dispatch failed.`, null);
                return false;
            }
        };

        // --- EVENT LISTENERS ---
        document.getElementById('send-btn').addEventListener('click', async () => {
            const text = document.getElementById('prompt-input').value.trim();
            if (!text) return;
            document.getElementById('prompt-input').value = '';

            // Mutate
            const methods = [];
            if (document.getElementById('mut-zalgo').checked) methods.push({method: "zalgo_glitch", severity: parseFloat(document.getElementById('sev-zalgo').value)});
            if (document.getElementById('mut-scrambler').checked) methods.push({method: "tokenization_scrambler", severity: parseFloat(document.getElementById('sev-scrambler').value)});
            if (document.getElementById('mut-emoji').checked) methods.push({method: "emoji_flood", severity: parseFloat(document.getElementById('sev-emoji').value)});
            if (document.getElementById('mut-science').checked) methods.push({method: "science_greek", severity: parseFloat(document.getElementById('sev-science').value)});
            if (document.getElementById('mut-rtl').checked) methods.push({method: "rtl_override"});
            if (document.getElementById('mut-trans').checked) methods.push({method: "translation_bypass", target_lang: document.getElementById('trans-lang-select').value});

            let finalPayload = text;
            if (methods.length > 0) {
                const res = await netClient.call('/api/v1/mutate', {text: text, methods: methods});
                const data = await res.json();
                finalPayload = data.mutated;
            }

            if (isRecording) {
                sequencer.tracks.push({
                    prompt: text,
                    timestamp: new Date().toISOString()
                });
            }

            if (document.getElementById('mim-toggle').checked) {
                themeManager.triggerBoundaryViolation();
                window.triggerMiMEditor(finalPayload);
                return;
            }

            document.getElementById('chat-loader').style.display = "block";
            await window.dispatchToLiveModel(finalPayload);
            document.getElementById('chat-loader').style.display = "none";
        });

        document.getElementById('prompt-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });

        // Setup MiM
        const mimEditor = document.getElementById('mim-editor');
        const mimTextarea = document.getElementById('mim-textarea');
        window.triggerMiMEditor = (payload) => {
            mimTextarea.value = payload;
            mimEditor.classList.add('active');

            // Visual Guts: Intercept State (Dynamic background swapping)
            document.getElementById('dynamic-bg').style.backgroundImage = "url('../assets/hq720.jpg')";
            document.getElementById('dynamic-bg').style.opacity = "0.6";
        };

        document.getElementById('mim-release-btn').addEventListener('click', async () => {
            mimEditor.classList.remove('active');

            // Revert background
            document.getElementById('dynamic-bg').style.backgroundImage = "url('../assets/wp4377514.jpg')";
            document.getElementById('dynamic-bg').style.opacity = "0.3";
            themeManager.setThemeForModel(document.getElementById('model-select').value);

            document.getElementById('chat-loader').style.display = "block";
            await window.dispatchToLiveModel(mimTextarea.value);
            document.getElementById('chat-loader').style.display = "none";

            if (sequencer.isPlaying) {
                sequencer.playhead++;
                sequencer.play();
            }
        });

        document.getElementById('mim-drop-btn').addEventListener('click', () => {
            mimEditor.classList.remove('active');
            document.getElementById('dynamic-bg').style.backgroundImage = "url('../assets/wp4377514.jpg')";
            document.getElementById('dynamic-bg').style.opacity = "0.3";
            themeManager.setThemeForModel(document.getElementById('model-select').value);
            appendLogEvent(`INTERCEPT DROPPED`);
            sequencer.isPlaying = false; // Halt automation
        });

        // --- INIT DATA ---
        let pendingModelSelection = null;
        let previousModelSelection = null;
        let modelRegistry = []; // Store full model metadata for capability checks
        const sessionModal = document.getElementById('sessionModal');

        function checkVisionCapability(modelId) {
            const model = modelRegistry.find(m => m.id === modelId);
            const errorDiv = document.getElementById('model-error');
            if (model && !model.capabilities.includes('vision')) {
                errorDiv.style.display = 'block';
            } else {
                errorDiv.style.display = 'none';
            }
        }

        async function boot() {
            // Catalogs
            const catRes = await netClient.get('/api/v1/catalog');
            const catalog = await catRes.json();
            
            // Languages
            const lSelect = document.getElementById('trans-lang-select');
            for (const [name, code] of Object.entries(catalog.languages)) {
                lSelect.appendChild(new Option(name, code));
            }

            // Populating Tricky Payloads Catalog
            const trickyContainer = document.getElementById('catalog-tricky-container');
            if (catalog.tricky_payloads) {
                catalog.tricky_payloads.forEach(p => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.style.width = '100%';
                    btn.style.textAlign = 'left';
                    btn.style.fontSize = '10px';
                    btn.style.marginBottom = '5px';
                    btn.innerText = p.length > 40 ? p.substring(0, 37) + "..." : p;
                    btn.onclick = () => document.getElementById('prompt-input').value = p;
                    trickyContainer.appendChild(btn);
                });
            }

            // Models
            const modRes = await netClient.get('/api/v1/models');
            const modData = await modRes.json();
            modelRegistry = modData.models;
            const mSelect = document.getElementById('model-select');
            mSelect.innerHTML = '';

            // Group models by capabilities/type for the dropdown
            const groups = {};
            modData.models.forEach(m => {
                if(!groups[m.type]) groups[m.type] = [];
                groups[m.type].push(m);
            });

            for(const [type, models] of Object.entries(groups)) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = `--- ${type.toUpperCase()} ---`;
                models.forEach(m => {
                    optgroup.appendChild(new Option(`[${m.status}] ${m.name}`, m.id));
                });
                mSelect.appendChild(optgroup);
            }

            // Apply initial theme
            if(mSelect.value) {
                themeManager.setThemeForModel(mSelect.value);
                window.previousModelSelection = mSelect.value;
                checkVisionCapability(mSelect.value);
            }

            mSelect.addEventListener('change', e => {
                const newModel = e.target.value;
                
                if (chatHistory.children.length > 0) {
                    // Store the intended selection but revert the dropdown visually until confirmed
                    pendingModelSelection = newModel;
                    e.target.value = window.previousModelSelection;
                    sessionModal.style.display = "block";
                } else {
                    window.previousModelSelection = newModel;
                    themeManager.setThemeForModel(newModel);
                    checkVisionCapability(newModel);
                    document.getElementById('image-upload').dispatchEvent(new Event('change'));
                }
            });
        }

        // --- SESSION & TAPE DECK ---
        document.getElementById('play-btn').addEventListener('click', () => {
            if (sequencer.tracks.length > 0) {
                appendLogEvent("STARTING SEQUENCE PLAYBACK");
                sequencer.play();
            } else {
                appendLogEvent("ERROR: No tracks loaded in Tape Deck.");
            }
        });

        document.getElementById('record-btn').addEventListener('click', (e) => {
            isRecording = !isRecording;
            if (isRecording) {
                e.target.innerText = "⏹ STOP";
                e.target.style.backgroundColor = "var(--alert-red)";
                appendLogEvent("RECORDING SESSION TO SEQUENCE");
                sequencer.tracks = []; // Reset for new recording
            } else {
                e.target.innerText = "🔴 REC";
                e.target.style.backgroundColor = "transparent";
                appendLogEvent(`RECORDING SAVED: ${sequencer.tracks.length} TURNS`);
            }
        });

        // Modal Actions
        const finalizeModelSwitch = () => {
            const mSelect = document.getElementById('model-select');
            mSelect.value = pendingModelSelection;
            window.previousModelSelection = pendingModelSelection;
            
            themeManager.setThemeForModel(pendingModelSelection);
            checkVisionCapability(pendingModelSelection);
            
            chatHistory.innerHTML = '';
            pendingModelSelection = null;
            sessionModal.style.display = "none";
            document.getElementById('image-upload').dispatchEvent(new Event('change'));
        };

        document.getElementById('modal-discard-btn').addEventListener('click', () => {
            finalizeModelSwitch();
        });

        document.getElementById('modal-save-btn').addEventListener('click', async () => {
            const history = Array.from(chatHistory.children).map(turn => {
                const user = turn.querySelector('.user-role')?.innerText;
                const assistant = turn.querySelector('.assistant-role')?.innerText;
                return { user, assistant };
            });

            try {
                await netClient.call('/api/v1/vault/save', {
                    model: window.previousModelSelection,
                    history: history,
                    timestamp: new Date().toISOString()
                });
                appendLogEvent("SESSION SAVED TO VAULT");
            } catch (e) {
                console.error("Vault save failed", e);
                appendLogEvent("ERROR: Failed to save session to vault.");
            }
            finalizeModelSwitch();
        });

        boot();

    </script>
</body>
</html>
