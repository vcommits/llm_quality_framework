# /etc/nginx/conf.d/ghidorah-api-bridge.conf
# This file creates the secure JSON-RPC proxy to the ubus socket and the reverse proxy for the honeypot service.

server {
    # Listen only on the secure Tailscale interface for management
    listen 100.120.132.20:80;
    server_name node0.ghidorah.mesh;

    # By default, deny all access to prevent accidental exposure.
    location / {
        deny all;
    }

    # A. The API Bridge for Node 3 to control Node 0
    location /v1/audit/gate {
        # Security: In a production setup, you would restrict this to Node 3's IP.
        # allow <NODE_3_TAILSCALE_IP>;
        # deny all;

        # Proxy the request to the internal ubus socket
        proxy_pass http://unix:/var/run/ubus/ubus.sock;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # B. The Honeypot Server Reverse Proxy
    # This location block exposes the Python-based honeypot service running on port 5000.
    location /hp/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
