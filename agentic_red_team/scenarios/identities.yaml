# =============================================================================
# AGENTIC RED TEAM: IDENTITY CONFIGURATION
# =============================================================================
personas:
  # --- TARGETS (Victims) ---
  - id: "persona_mom_native"
    role: "primary_user"
    credentials:
      email_env: "TEST_ACCOUNT_MOM_EMAIL"
      password_env: "TEST_ACCOUNT_MOM_PASS"
    browser_profile_name: "Mom_Profile_Native"

  - id: "persona_ghost_anon"
    role: "anonymous_user"
    credentials: {}
    browser_profile_name: "Ghost_User_Profile_01"

  # --- ATTACKERS (The Red Team Brains) ---
  - id: "attacker_brain_smart"
    role: "operator"
    credentials:
      provider: "google"
      model_name: "gemini-1.5-pro"
      api_key_env: "GEMINI_API_KEY"

  # --- EVALUATORS (The Judges) ---
  - id: "evaluator_judge_gpt4"
    role: "judge"
    description: "The Gold Standard Judge (High Cost)."
    credentials:
      provider: "openai"
      model_name: "gpt-4-turbo"
      api_key_env: "OPENAI_API_KEY"

  - id: "evaluator_judge_glider"
    role: "judge"
    description: "Patronus AI Glider (3B). The SOTA Small Language Model Judge."
    credentials:
      provider: "huggingface"
      model_name: "PatronusAI/glider"
      api_key_env: "HUGGINGFACE_API_KEY"

  - id: "evaluator_judge_llama"
    role: "judge"
    description: "Llama 3 70B via Together AI. Fast and reasoning-heavy."
    credentials:
      provider: "together_ai"
      model_name: "meta-llama/Llama-3-70b-chat-hf"
      api_key_env: "TOGETHERAI_API_KEY"